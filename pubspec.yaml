name: boringssl_dart
description: >-
  BoringSSL crypto bindings for Dart built with Dart Hooks (Native Assets),
  exposing WebCrypto-style AES, RSA, EC, hashing, HMAC, and KDF APIs.
version: 1.0.0
repository: https://github.com/koji-1009/boringssl_dart

environment:
  sdk: ^3.10.0

# Add regular dependencies here.
dependencies:
  ffi: ^2.1.4
  code_assets: ^1.0.0
  hooks: ^1.0.0
  logging: ^1.3.0
  native_toolchain_c: ^0.17.6

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
  ffigen: ^20.1.1
  crypto: ^3.0.7
