name: Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-24.04, ubuntu-24.04-arm, windows-2025, macos-26 ]
        sdk: [ stable, beta ]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dart-lang/setup-dart@65eb853c7ba17dde3be364c3d2858773e7144260 # v1.7.2
        with:
          sdk: ${{ matrix.sdk }}
      - name: Run Tests
        run: |
          dart pub get
          dart test

      - name: AOT smoke (link-hook path)
        shell: bash
        run: |
          dart build cli --target example/ec_spki_roundtrip.dart -o build/smoke
          "build/smoke/bundle/bin/ec_spki_roundtrip"
